name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Test
        run: swift test

      - name: Build app bundle
        run: make app

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: Drowzy.app
          path: .build/Drowzy.app
