name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-14

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Test
        run: swift test

      - name: Package
        run: make package

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" .build/dist/* --generate-notes
